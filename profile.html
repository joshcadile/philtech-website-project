<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Official Profile - PHILTECH</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div style="background: rgba(0, 0, 0, 0.7); min-height: 100vh; padding: 40px; display: flex; justify-content: center;">
        <div id="profileDoc" class="mission-card" style="width: 100%; max-width: 600px; display: none;">
            <center>
                <img src="logo.png" width="80">
                <h1 style="color:#800000; font-size: 1.5rem;">STUDENT ENROLLMENT PROFILE</h1>
            </center>
            <hr>
            <p><strong>Name:</strong> <span id="resName"></span></p>
            <p><strong>Course:</strong> <span id="resCourse"></span></p>
            <center style="margin-top: 30px;">
                <button onclick="window.print()" class="btn" style="background: #3366ff;">PRINT AS PDF</button>
                <a href="Index.html" class="btn">HOME</a>
                <button onclick="logout()" class="btn" style="background: #444;">LOGOUT</button>
            </center>
        </div>
    </div>

    <script>
        const loggedIn = localStorage.getItem('isLoggedIn');
        
        if(loggedIn === 'true') {
            document.getElementById('profileDoc').style.display = "block";
            document.getElementById('resName').innerText = localStorage.getItem('studentName') || "N/A";
            document.getElementById('resCourse').innerText = localStorage.getItem('studentCourse') || "N/A";
        } else {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = "Index.html";
        }
    </script>
</body>
</html>
