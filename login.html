<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Philtech-GMA</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;">

    <div class="login-container" style="width: 100%; max-width: 280px; padding: 25px; margin: auto;">
        <img src="logo.png" width="55" style="margin-bottom: 10px;">
        <h2 style="color: #800000; font-size: 1.2rem; margin-bottom: 15px;">Student Login</h2>
        
        <div style="text-align: left;">
            <label style="font-size: 12px; font-weight: bold;">Username</label>
            <input type="text" id="user_input" placeholder="Enter username" style="width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
            
            <label style="font-size: 12px; font-weight: bold;">Password</label>
            <input type="password" id="pass_input" placeholder="Enter password" style="width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
        </div>
        
        <button onclick="validateLogin()" class="btn" style="width: 100%; padding: 12px;">LOGIN</button>

        <div style="margin: 15px 0; color: #999; font-size: 11px; display: flex; align-items: center; justify-content: center;">
            <hr style="flex: 1; border: 0; border-top: 1px solid #eee;">
            <span style="padding: 0 10px;">OR</span>
            <hr style="flex: 1; border: 0; border-top: 1px solid #eee;">
        </div>

        <div id="googleBtn" style="display: flex; justify-content: center; overflow: hidden;">
            <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard" data-size="medium"></div>
        </div>
        
        <div style="margin-top: 20px; font-size: 12px;">
            <a href="Index.html" style="color: #3366ff; text-decoration: none;">Back to Home</a>
        </div>
    </div>

    <script>
        function validateLogin() {
            const u = document.getElementById('user_input').value;
            const p = document.getElementById('pass_input').value;
            
            if (u === localStorage.getItem('savedUser') && p === localStorage.getItem('savedPass') && u !== "") {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = "profile.html";
            } else {
                alert("Invalid credentials!");
            }
        }

        function handleCredentialResponse(response) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('studentName', 'Google User');
            window.location.href = "profile.html";
        }
    </script>
</body>
</html>
