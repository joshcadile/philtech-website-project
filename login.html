<!DOCTYPE html>
<html>
<head>
    <title>Login - PHILTECH</title>
    <style>
        input[type="text"], input[type="password"] { padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        input[type="submit"] { background-color: #800000; color: white; padding: 10px 25px; border: none; cursor: pointer; font-weight: bold; }
        input[type="submit"]:hover { background-color: #3366ff; }
    </style>
</head>
<body background="banner.jpg" bgcolor="#3c1e50" text="white">
    <table width="100%" border="0" cellpadding="10">
        <tr>
            <td align="left"><a href="index.html"><img src="logo.png" width="80" alt="School Logo" border="0"></a></td>
            <td align="right"><a href="index.html"><button type="button">HOME</button></a></td>
        </tr>
    </table>
    <br><br>
    <table width="100%" border="0">
        <tr>
            <td align="center">
                <table bgcolor="white" border="1" cellpadding="40" width="400">
                    <tr>
                        <td align="center">
                            <font color="red" size="6" face="Arial"><strong>LOGIN</strong></font>
                            <form action="index.html">
                                <p align="left"><font color="black">USERNAME</font></p>
                                <input type="text" name="user">
                                <p align="left"><font color="black">PASSWORD</font></p>
                                <input type="password" name="pass">
                                <br><br>
                                <input type="submit" value="LOGIN">
                            </form>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
